name: Static Analysis

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: clang-tidy and cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Debug build cache
        uses: actions/cache@v4
        with:
          path: build/Debug
          key: ${{ runner.os }}-debug-build-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.devcontainer/Dockerfile', '.gitmodules', 'st_gen/toolchain/gcc-arm-none-eabi.cmake', 'src/**', 'tests/**', 'Drivers/**') }}
          restore-keys: |
            ${{ runner.os }}-debug-build-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: peleng-devcontainer:ci
          cache-from: type=gha

      - name: Generate host compile commands in devcontainer
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            peleng-devcontainer:ci \
            bash -lc 'cmake -S tests -B build/tests -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON'

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-tidy cppcheck

      - name: Prepare analysis report directory
        run: mkdir -p build/reports

      - name: Run clang-tidy
        run: |
          set -o pipefail

          mapfile -t TIDY_FILES < <(
            printf '%s\n' \
              src/peleng/Filter.cpp \
              src/peleng/DelayEstimator.cpp
          )

          if [ "${#TIDY_FILES[@]}" -eq 0 ]; then
            echo "No files selected for clang-tidy"
            exit 1
          fi

          clang-tidy -p build/tests "${TIDY_FILES[@]}" \
            2>&1 | tee build/reports/clang-tidy.txt

      - name: Run cppcheck
        run: |
          cppcheck \
            --project=build/tests/compile_commands.json \
            --enable=warning,performance,portability \
            --file-filter=src/peleng/* \
            --suppress=preprocessorErrorDirective \
            --inline-suppr \
            --error-exitcode=1 \
            --output-file=build/reports/cppcheck.txt

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            build/reports/clang-tidy.txt
            build/reports/cppcheck.txt
          if-no-files-found: warn
          retention-days: 14

  host-tests:
    name: Host DSP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache host test build
        uses: actions/cache@v4
        with:
          path: build/tests
          key: ${{ runner.os }}-host-tests-${{ hashFiles('tests/**', 'src/peleng/**', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-host-tests-

      - name: Configure host tests
        run: cmake -S tests -B build/tests -DCMAKE_BUILD_TYPE=Debug

      - name: Build host tests
        run: cmake --build build/tests -j

      - name: Run host tests
        run: ctest --test-dir build/tests --output-on-failure
