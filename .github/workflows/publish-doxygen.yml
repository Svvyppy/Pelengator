name: Publish Doxygen Docs

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: doxygen-pages
  cancel-in-progress: true

jobs:
  docs:
    name: Build and Deploy Doxygen
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build devcontainer image
        run: docker build -t peleng-devcontainer -f .devcontainer/Dockerfile .devcontainer

      - name: Build docs target inside devcontainer
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspaces/Peleng" \
            -w /workspaces/Peleng \
            peleng-devcontainer \
            bash -lc '
              cmake --preset Debug &&
              cmake --build --preset Debug --target docs
            '

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/Debug/docs/doxygen/html

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
