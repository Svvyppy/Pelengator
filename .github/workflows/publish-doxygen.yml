name: Publish Doxygen Docs

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: doxygen-pages
  cancel-in-progress: true

jobs:
  docs:
    name: Build and Deploy Doxygen
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Debug build cache
        uses: actions/cache@v4
        with:
          path: build/Debug
          key: ${{ runner.os }}-debug-build-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.devcontainer/Dockerfile', '.gitmodules', 'st_gen/toolchein/gcc-arm-none-eabi.cmake', 'src/**', 'Drivers/**') }}
          restore-keys: |
            ${{ runner.os }}-debug-build-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: Dockerfile
          load: true
          tags: peleng-devcontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build docs target inside devcontainer
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            peleng-devcontainer:ci \
            bash -lc '
              cmake --preset Debug &&
              cmake --build --preset Debug --target docs
            '

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/Debug/docs/doxygen/html

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
